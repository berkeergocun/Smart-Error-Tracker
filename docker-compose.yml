version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: smart-error-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: smarterror123
      MONGO_INITDB_DATABASE: smart_error_tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smart-error-network

  mongo-express:
    image: mongo-express:latest
    container_name: smart-error-tracker-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: smarterror123
      ME_CONFIG_MONGODB_URL: mongodb://root:smarterror123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - smart-error-network

volumes:
  mongo_data:
    driver: local

networks:
  smart-error-network:
    driver: bridge
