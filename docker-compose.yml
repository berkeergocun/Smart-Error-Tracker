version: "3.9"

services:
  # ─── Veritabanı ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: smart-error-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: smarterror123
      MONGO_INITDB_DATABASE: smart_error_tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smart-error-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:latest
    container_name: smart-error-tracker-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: smarterror123
      ME_CONFIG_MONGODB_URL: mongodb://root:smarterror123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smart-error-network

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-error-tracker-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://root:smarterror123@mongodb:27017/smart_error_tracker?authSource=admin
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
      # OpenRouter API anahtarı – https://openrouter.ai (ücretsiz plan mevcut)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-stepfun/step-3.5-flash:free}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smart-error-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend Dashboard ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tarayıcının backend'e erişeceği URL (host makineden görünen adres)
        NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: smart-error-tracker-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smart-error-network

volumes:
  mongo_data:
    driver: local

networks:
  smart-error-network:
    driver: bridge
