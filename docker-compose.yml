# Smart Error Tracker – Docker Compose (Dokploy / Production)
# ──────────────────────────────────────────────────────────────────────────────
# Gerekli ortam değişkenleri (.env veya Dokploy'un Environment sekmesi):
#   MONGO_ROOT_PASSWORD   – MongoDB root şifresi
#   OPENROUTER_API_KEY    – https://openrouter.ai API anahtarı
#   JWT_SECRET            – Token imzalama için rastgele uzun string
#   NUXT_PUBLIC_API_URL   – Backend'in herkese açık URL'i  (örn: https://api.domain.com)
#   FRONTEND_URL          – Frontend'in herkese açık URL'i (örn: https://domain.com)
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ─── Veritabanı ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: smart-error-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-smarterror123}
      MONGO_INITDB_DATABASE: smart_error_tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-error-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-error-tracker-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-smarterror123}@mongodb:27017/smart_error_tracker?authSource=admin
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-exp:free}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smart-error-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend Dashboard ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart-error-tracker-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smart-error-network

volumes:
  mongo_data:

networks:
  smart-error-network:
    driver: bridge
